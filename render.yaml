services:
  - type: web
    name: layered-career-strategy-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start-web.sh
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODE
        value: auto
      - key: CAREER_OUTPUT_ROOT
        value: /tmp/outputs
      - key: WEB_CONCURRENCY
        value: "1"
